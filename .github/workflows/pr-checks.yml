name: Pull Request Checks

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, dev]

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    # Skip checks for draft PRs unless explicitly requested
    if: github.event.pull_request.draft == false || contains(github.event.pull_request.labels.*.name, 'ready-for-review')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          echo "Dependencies installed successfully"

      - name: Cache ESLint and TypeScript
        uses: actions/cache@v3
        with:
          path: |
            node_modules/.cache
            .eslintcache
          key: ${{ runner.os }}-lint-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-lint-

      - name: Run TypeScript type checking
        run: |
          echo "🔍 Running TypeScript type checking..."
          npm run type-check
          echo "✅ TypeScript type checking passed"

      - name: Run ESLint
        run: |
          echo "🔍 Running ESLint..."
          npm run lint
          echo "✅ ESLint checks passed"

      - name: Check for formatting issues (Prettier)
        run: |
          echo "🔍 Checking code formatting..."
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"
          echo "✅ Code formatting is correct"

      - name: Build application
        run: |
          echo "🏗️ Building application..."
          echo "This is the comprehensive build test moved from pre-commit hook"
          npm run build
          echo "✅ Build completed successfully"
          echo "Build artifacts created and verified"
